name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: gh release create "${{ github.ref_name }}" --draft --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
